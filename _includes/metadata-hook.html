<!-- Alternate language links for jekyll-polyglot (SEO hreflang) -->
{% if site.languages %}
  {% for tongue in site.languages %}
    <link
      rel="alternate"
      hreflang="{{ tongue }}"
      {% static_href %}href="{{ site.url }}{{ site.baseurl }}{% unless tongue == site.default_lang %}/{{ tongue }}{% endunless %}{{ page.url }}"{% endstatic_href %}
    >
  {% endfor %}
  <link
    rel="alternate"
    hreflang="x-default"
    {% static_href %}href="{{ site.url }}{{ site.baseurl }}{{ page.url }}"{% endstatic_href %}
  >
{% endif %}
